version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: applyflow
      POSTGRES_PASSWORD: applyflow
      POSTGRES_DB: applyflow
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U applyflow']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
